        const encryptionKey = "Pq#uCVTwh^K)";

        function decryptData(encryptedData, key) {
            const binaryData = atob(encryptedData);
            let result = '';
            for (let i = 0; i < binaryData.length; i++) {
                result += String.fromCharCode(binaryData.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        }

        function renderHTMLContent() {
            try {
                
                document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('keydown', function(e){
            if(e.ctrlKey && ['u','s','p'].includes((e.key||'').toLowerCase())) e.preventDefault();
        });
document.addEventListener('keydown', function(e){
            if(e.keyCode === 123 || (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'i')) e.preventDefault();
        });

                
                const decryptedData = decryptData(encryptedData, encryptionKey);
                const frame = document.getElementById('htmlRendererFrame');
                const loading = document.getElementById('loading');
                
                
                const frameDoc = frame.contentDocument || frame.contentWindow.document;
                frameDoc.open();
                frameDoc.write(decryptedData);
                frameDoc.close();
                
                
                loading.style.display = 'none';
                
            } catch (error) {
                console.error('Error rendering content:', error);
                document.getElementById('loading').textContent = 'Error loading content';
            }
        }

        
        document.addEventListener('DOMContentLoaded', renderHTMLContent);
